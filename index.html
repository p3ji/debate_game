<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#FF6B6B">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Debate Showdown">
    <link rel="apple-touch-icon" href="./icon.png">
    <title>Kids Debate Showdown!</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container glass-panel">
        
        <!-- Screen: Setup -->
        <section id="screen-setup" class="screen active">
            <h1 class="title">Debate Showdown!</h1>
            <div class="input-group">
                <label for="team1-name">Team 1 Name:</label>
                <input type="text" id="team1-name" placeholder="e.g. Red Dragons" value="Team 1">
            </div>
            <div class="input-group">
                <label for="team2-name">Team 2 Name:</label>
                <input type="text" id="team2-name" placeholder="e.g. Blue Sharks" value="Team 2">
            </div>
            
            <button class="btn btn-secondary" style="width: 100%; margin-bottom: 1.5rem; background: rgba(255,255,255,0.8); color: var(--dark);" onclick="openSettings()">⚙️ Game Settings</button>
            
            <button class="btn btn-primary btn-large" onclick="startGame()">Start Match!</button>
        </section>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal">
            <div class="modal-content glass-panel" style="background: var(--primary);">
                <h2 style="color: var(--light);">Game Settings</h2>
                <div class="settings-group">
                    <div class="setting-item">
                        <label style="color: var(--light);">Themes (Select at least one):</label>
                        <div class="checkbox-group">
                            <label class="checkbox-container" style="color: var(--light);">Select All
                                <input type="checkbox" id="theme-all" checked onchange="toggleAllThemes(this)">
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container" style="color: var(--light);">🤪 Silly & Fun
                                <input type="checkbox" class="theme-check" value="silly" checked onchange="checkThemeSelection()">
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container" style="color: var(--light);">🏫 School & Education
                                <input type="checkbox" class="theme-check" value="school" checked onchange="checkThemeSelection()">
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container" style="color: var(--light);">🍔 Food & Drink
                                <input type="checkbox" class="theme-check" value="food" checked onchange="checkThemeSelection()">
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container" style="color: var(--light);">🐶 Animals & Pets
                                <input type="checkbox" class="theme-check" value="animals" checked onchange="checkThemeSelection()">
                                <span class="checkmark"></span>
                            </label>
                            <label class="checkbox-container" style="color: var(--light);">🚀 Tech & Future
                                <input type="checkbox" class="theme-check" value="tech" checked onchange="checkThemeSelection()">
                                <span class="checkmark"></span>
                            </label>
                        </div>
                    </div>
                    <div class="setting-item">
                        <label for="timer-duration" style="color: var(--light);">Timer (minutes):</label>
                        <input type="number" id="timer-duration" min="1" max="10" value="1">
                    </div>
                </div>
                <button class="btn btn-primary" style="width: 100%; margin-top: 1rem;" onclick="closeSettings()">Save & Close</button>
            </div>
        </div>


        <!-- Screen: Topic Reveal -->
        <section id="screen-topic" class="screen">
            <h2>Today's Topic Is...</h2>
            <div class="topic-box">
                <p id="topic-text">Loading...</p>
            </div>
            <button class="btn btn-primary" onclick="startDebatePhase()">Ready!</button>
        </section>

        <!-- Screen: Pass Device -->
        <section id="screen-pass-device" class="screen">
            <h2 id="pass-device-text">Pass the device to Team 1!</h2>
            <div class="icon-pass">📱🤝📱</div>
            <button class="btn btn-primary" onclick="startTimer()">I am ready!</button>
        </section>

        <!-- Screen: Debate Timer -->
        <section id="screen-debate" class="screen">
            <h2 id="current-speaker">Team 1's Turn</h2>
            <p class="topic-reminder" id="topic-reminder-text"></p>
            <div class="timer-display" id="timer-display">01:00</div>
            <button class="btn btn-danger" onclick="skipTimer()">Finish Early</button>
        </section>

        <!-- Screen: Judge -->
        <section id="screen-judge" class="screen">
            <h2>Judge's Rubric</h2>
            <p>Pass the device to the judge to evaluate both teams!</p>
            
            <div class="rubric-container">
                <div class="team-rubric" id="rubric-team1">
                    <h3 id="rubric-team1-name">Team 1</h3>
                    
                    <label class="checkbox-container">Stated their position clearly (1 pt)
                        <input type="checkbox" class="t1-check">
                        <span class="checkmark"></span>
                    </label>
                    <label class="checkbox-container">Gave at least two reasons (1 pt)
                        <input type="checkbox" class="t1-check">
                        <span class="checkmark"></span>
                    </label>
                    <label class="checkbox-container">Stayed on topic (1 pt)
                        <input type="checkbox" class="t1-check">
                        <span class="checkmark"></span>
                    </label>
                    <label class="checkbox-container">Spoke loud and clear (1 pt)
                        <input type="checkbox" class="t1-check">
                        <span class="checkmark"></span>
                    </label>
                    
                    <div class="subjective-score">
                        <label>Persuasiveness "Wow" Factor (0-3 pts):</label>
                        <input type="range" class="t1-slider" min="0" max="3" value="0" oninput="updateSliderVal('t1-val', this.value)">
                        <span id="t1-val" class="slider-val">0</span>
                    </div>
                </div>

                <div class="team-rubric" id="rubric-team2">
                    <h3 id="rubric-team2-name">Team 2</h3>
                    
                    <label class="checkbox-container">Stated their position clearly (1 pt)
                        <input type="checkbox" class="t2-check">
                        <span class="checkmark"></span>
                    </label>
                    <label class="checkbox-container">Gave at least two reasons (1 pt)
                        <input type="checkbox" class="t2-check">
                        <span class="checkmark"></span>
                    </label>
                    <label class="checkbox-container">Stayed on topic (1 pt)
                        <input type="checkbox" class="t2-check">
                        <span class="checkmark"></span>
                    </label>
                    <label class="checkbox-container">Spoke loud and clear (1 pt)
                        <input type="checkbox" class="t2-check">
                        <span class="checkmark"></span>
                    </label>
                    
                    <div class="subjective-score">
                        <label>Persuasiveness "Wow" Factor (0-3 pts):</label>
                        <input type="range" class="t2-slider" min="0" max="3" value="0" oninput="updateSliderVal('t2-val', this.value)">
                        <span id="t2-val" class="slider-val">0</span>
                    </div>
                </div>
            </div>
            
            <button class="btn btn-primary btn-large" onclick="calculateWinner()">Reveal Winner!</button>
        </section>

        <!-- Screen: Winner -->
        <section id="screen-winner" class="screen">
            <h2>The Winner Is...</h2>
            <div class="winner-box">
                <h1 id="winner-name">Team 1!</h1>
            </div>
            <div class="score-breakdown">
                <p><span id="score-t1-name">Team 1</span> Score: <span id="score-t1-val">0</span></p>
                <p><span id="score-t2-name">Team 2</span> Score: <span id="score-t2-val">0</span></p>
            </div>
            <button class="btn btn-primary" onclick="resetGame()">Play Again</button>
        </section>

    </div>
    
    <!-- Confetti Canvas -->
    <canvas id="confetti-canvas"></canvas>

    <script src="script.js"></script>
</body>
</html>
